<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mobius HIVE — 16-bit World Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#e8c547; --aqua:#3dffea; --ink:#0b0a1f; --panel:rgba(12,11,31,.86); }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#05040f;
    font-family:'Press Start 2P',monospace; color:#e8e8ff; -webkit-user-select:none; user-select:none; }
  #c{ display:block; image-rendering:pixelated; touch-action:none; }
  #stage{ position:fixed; inset:0; }

  /* top status bar */
  #hud{ position:fixed; top:0; left:0; right:0; display:flex; flex-wrap:wrap; gap:8px 14px;
    align-items:center; padding:8px 12px; background:linear-gradient(180deg,rgba(11,10,31,.95),rgba(11,10,31,.0));
    font-size:9px; line-height:1.4; z-index:5; pointer-events:none; }
  #hud .pill{ white-space:nowrap; }
  .gold{ color:var(--gold);} .aqua{ color:var(--aqua);} .green{ color:#8cffa8;}
  .red{ color:#ff7a7a;} .muted{ color:#7a7a9a;}

  /* dialog */
  #dialog{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%);
    width:min(680px,92vw); background:var(--panel); border:2px solid var(--aqua);
    border-radius:8px; padding:14px 16px; display:none; z-index:7;
    box-shadow:0 0 24px rgba(61,255,234,.25); }
  #dialog.show{ display:block; }
  #dwho{ color:var(--aqua); font-size:10px; margin-bottom:8px; }
  #dtxt{ font-size:10px; line-height:1.7; }
  #dmore{ margin-top:10px; font-size:8px; color:var(--muted); text-align:right; }

  /* center toast */
  #toast{ position:fixed; left:50%; top:64px; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--gold); border-radius:6px;
    padding:8px 12px; font-size:9px; color:var(--gold); opacity:0;
    transition:opacity .3s; z-index:6; pointer-events:none; text-align:center; }
  #toast.show{ opacity:1; }

  /* overlays (intro / win) */
  .overlay{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; gap:18px; padding:24px; z-index:9;
    background:radial-gradient(circle at 50% 40%,rgba(20,18,46,.86),rgba(5,4,15,.97)); }
  .overlay.show{ display:flex; }
  .overlay h1{ font-size:clamp(18px,5vw,34px); color:var(--gold); margin:0; text-shadow:0 0 18px rgba(232,197,71,.5); letter-spacing:1px; }
  .overlay h2{ font-size:clamp(9px,2.4vw,13px); color:var(--aqua); margin:0; letter-spacing:2px; }
  .overlay p{ font-size:10px; line-height:1.8; max-width:560px; color:#c8c8e8; }
  .overlay .cta{ font-size:11px; color:#05040f; background:var(--aqua); padding:12px 18px;
    border-radius:6px; box-shadow:0 0 22px rgba(61,255,234,.5); animation:pulse 1.4s infinite; }
  @keyframes pulse{ 50%{ box-shadow:0 0 8px rgba(61,255,234,.3);} }
  .overlay .small{ font-size:8px; color:var(--muted); line-height:1.9; }

  /* touch controls */
  #touch{ position:fixed; inset:0; z-index:4; display:none; }
  #touch.show{ display:block; }
  #dpad{ position:absolute; left:16px; bottom:20px; width:150px; height:150px; }
  #dpad button{ position:absolute; width:50px; height:50px; background:rgba(40,36,86,.7);
    border:2px solid rgba(120,120,200,.6); color:#cfd0ff; border-radius:8px; font-size:14px;
    font-family:inherit; }
  #dpad .up{ left:50px; top:0;} #dpad .down{ left:50px; bottom:0;}
  #dpad .left{ left:0; top:50px;} #dpad .right{ right:0; top:50px;}
  #abtn{ position:absolute; right:24px; bottom:42px; width:88px; height:88px; border-radius:50%;
    background:rgba(61,255,234,.18); border:2px solid var(--aqua); color:var(--aqua);
    font-family:inherit; font-size:13px; }
  #dev{ position:fixed; top:40px; left:6px; color:#0f0; font:11px monospace; display:none; z-index:8; }

  /* objectives button + panel */
  #objbtn{ position:fixed; top:6px; right:8px; z-index:8; font-family:inherit; font-size:8px;
    color:var(--aqua); background:rgba(12,11,31,.82); border:1px solid var(--aqua);
    border-radius:6px; padding:7px 9px; cursor:pointer; line-height:1.3; }
  #objbtn b{ color:var(--gold); }
  #objectives{ position:fixed; top:0; right:0; height:100%; width:min(300px,86vw);
    background:rgba(8,7,24,.95); border-left:2px solid var(--aqua); z-index:10;
    transform:translateX(102%); transition:transform .22s ease; padding:14px;
    overflow-y:auto; box-shadow:-8px 0 30px rgba(0,0,0,.5); }
  #objectives.show{ transform:translateX(0); }
  #objectives h3{ color:var(--gold); font-size:11px; margin:2px 0 12px; letter-spacing:1px; }
  #map{ width:100%; height:auto; image-rendering:pixelated; border:1px solid rgba(120,120,200,.4);
    border-radius:4px; background:#070617; margin-bottom:12px; }
  #objbody{ font-size:8px; line-height:1.9; }
  #objbody .q{ color:var(--aqua); margin:2px 0 8px; }
  #objbody .step{ color:#c8c8e8; } #objbody .step.done{ color:#8cffa8; }
  #objbody .hdr{ color:#7a7a9a; margin:12px 0 4px; letter-spacing:1px; }
  #objbody .realm{ display:flex; justify-content:space-between; gap:8px; padding:2px 0; }
  #objbody .realm .st{ color:#7a7a9a; } #objbody .realm .st.go{ color:var(--aqua); }
  #objbody .realm .st.ok{ color:#8cffa8; }
  #objbody .chron{ font-size:8px; line-height:1.8; color:#c8c8e8; padding:1px 0; }
  #objbody .chron.muted{ color:var(--muted); }
  #objclose{ margin-top:14px; font-size:8px; color:var(--muted); text-align:center; }

  /* RPG layer (C-353) */
  .purple{ color:#c4b5fd; }
  #rpgbar{ position:fixed; top:34px; left:10px; z-index:6; display:flex; flex-direction:column; gap:3px; width:154px; pointer-events:none; }
  #rpgbar .rb{ height:8px; background:rgba(8,7,20,.8); border:1px solid #2a2350; border-radius:3px; overflow:hidden; }
  #rpgbar .rf{ height:100%; width:100%; transition:width .2s; }
  #rpgbar .rf.hp{ background:linear-gradient(90deg,#ef4444,#f87171); }
  #rpgbar .rf.mp{ background:linear-gradient(90deg,#3b82f6,#60a5fa); }
  #rpgbar .rf.xp{ background:linear-gradient(90deg,#c8a84b,#f6c860); }
  #rpg-label{ font-size:7px; color:#9a9ac0; font-family:'Press Start 2P',monospace; line-height:1.6; }
  #skillbar{ position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:6; display:flex; gap:6px; }
  #skillbar .sk{ width:62px; height:38px; background:rgba(12,11,31,.85); border:1px solid var(--aqua);
    border-radius:6px; color:var(--aqua); font-family:'Press Start 2P',monospace; font-size:7px;
    cursor:pointer; position:relative; padding-top:8px; }
  #skillbar .sk .k{ position:absolute; top:2px; left:4px; font-size:6px; color:#7a7a9a; }
  #skillbar .sk.cd{ opacity:.4; }
  @media (max-width:520px){
    #skillbar{ left:auto; right:6px; bottom:auto; top:30px; transform:none; gap:4px; }
    #skillbar .sk{ width:46px; height:30px; font-size:6px; padding-top:6px; }
    #rpgbar{ width:108px; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div id="hud"></div>
<div id="toast"></div>
<div id="dev"></div>

<div id="rpgbar">
  <div class="rb"><div id="bar-hp" class="rf hp"></div></div>
  <div class="rb"><div id="bar-mp" class="rf mp"></div></div>
  <div class="rb"><div id="bar-xp" class="rf xp"></div></div>
  <div id="rpg-label">HP 100/100  MP 60/60</div>
</div>
<div id="skillbar"></div>

<button id="objbtn" type="button" aria-label="Objectives">◧ OBJECTIVES <b>0/9</b></button>
<aside id="objectives" aria-label="Objectives panel">
  <h3 id="objtitle">OBJECTIVES</h3>
  <canvas id="map" width="180" height="140"></canvas>
  <div id="objbody"></div>
  <div id="objclose">[Q] / TAP ◧ TO CLOSE</div>
</aside>

<div id="dialog">
  <div id="dwho">—</div>
  <div id="dtxt">—</div>
  <div id="dmore">[E] ▾</div>
</div>

<div id="touch">
  <div id="dpad">
    <button type="button" class="up" data-k="up">▲</button>
    <button type="button" class="left" data-k="left">◀</button>
    <button type="button" class="right" data-k="right">▶</button>
    <button type="button" class="down" data-k="down">▼</button>
  </div>
  <button type="button" id="abtn" data-k="action">E</button>
</div>

<div id="intro" class="overlay show">
  <h2 id="introsub">16-BIT WORLD SIMULATOR</h2>
  <h1 id="introtitle">MOBIUS HIVE</h1>
  <p id="introp"></p>
  <div class="cta" id="introcta">PRESS E / TAP / START</div>
  <div class="small" id="introhint"></div>
</div>

<div id="win" class="overlay">
  <h2 id="winsub">CYCLE C-344 SEALED</h2>
  <h1 id="wintitle">RESTORED</h1>
  <p id="winbody"></p>
  <p class="aqua" id="winjade" style="font-size:9px"></p>
  <div class="cta" id="wincta">[E] WALK THE HIVE AGAIN</div>
</div>

<script type="module" src="./game.js"></script>
</body>
</html>
