name: World Update

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      use_fixtures:
        description: "Use deterministic fixtures instead of live mesh fetches"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: hive-world-update
  cancel-in-progress: true

jobs:
  world-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch pulse + cycle state
        env:
          HIVE_USE_FIXTURES: ${{ github.event_name == 'workflow_dispatch' && inputs.use_fixtures && '1' || '' }}
        run: node scripts/world/fetch-inputs.js

      - name: Build world state
        run: node scripts/world/build-world-state.js

      - name: Emit civic signal packets
        run: node scripts/world/emit-civic-signal.js

      - name: Install validators
        run: npm install --no-audit --no-fund

      - name: Validate world JSON schemas
        run: npm run world:validate-schemas

      - name: Report Phase 4 outputs
        run: |
          echo "Phase 4 HIVE world signal outputs:"
          echo "- world/current-cycle.json"
          echo "- world/current-world.json"
          echo "- world/hive-world-pulse.json"
          echo "- world/civic-signal.json"
          echo "- ledger/hive-world-state.json"
          echo "- ledger/feed.json"

      - name: Commit world update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "mobius-hive-bot"
          git config user.email "bot@mobius.systems"
          git add world/ ledger/ schemas/
          git commit -m "chore(hive): refresh world state from pulse [skip ci]" || exit 0
          git push
