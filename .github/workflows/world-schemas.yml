name: World schemas

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fixture ingest + world build + schema validate
        run: |
          HIVE_USE_FIXTURES=1 node scripts/world/fetch-inputs.js
          node scripts/world/build-world-state.js
          npm run world:validate-schemas

      - name: Syntax check world scripts
        run: node --check scripts/world/*.js
