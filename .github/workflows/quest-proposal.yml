name: Quest Proposal

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hive-quest-proposal
  cancel-in-progress: true

jobs:
  quest-proposal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate quest proposal
        run: node scripts/world/generate-quest-proposal.js

      - name: Write quest marker (no PR branch)
        run: node scripts/world/write-quest-proposal-marker.js

      - name: Commit marker to default branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "mobius-hive-bot"
          git config user.email "bot@mobius.systems"
          git add ledger/quest-proposals/*.marker.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(hive): quest proposal marker (${{ github.run_id }})"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
